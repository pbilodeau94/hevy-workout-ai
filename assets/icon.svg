<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fb923c"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- dumbbell -->
  <g fill="url(#bar)">
    <!-- left outer plate -->
    <rect x="56" y="176" width="40" height="160" rx="12"/>
    <!-- left inner plate -->
    <rect x="108" y="144" width="52" height="224" rx="16"/>
    <!-- bar -->
    <rect x="160" y="232" width="192" height="48" rx="10"/>
    <!-- right inner plate -->
    <rect x="352" y="144" width="52" height="224" rx="16"/>
    <!-- right outer plate -->
    <rect x="416" y="176" width="40" height="160" rx="12"/>
  </g>
  <!-- AI spark -->
  <g fill="#facc15">
    <circle cx="256" cy="120" r="14"/>
    <path d="M256 72 L264 104 L256 112 L248 104 Z"/>
    <path d="M256 168 L264 136 L256 128 L248 136 Z"/>
    <path d="M208 120 L240 112 L248 120 L240 128 Z"/>
